name: Feature Request
description: Suggest a new feature or enhancement for Inkforge
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! The more context you give, the better we can evaluate it.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this feature solve? Why do you need it?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "Generation pipeline (new format, tone, or length)"
        - "New publisher (platform integration)"
        - "CLI commands or flags"
        - "Web UI"
        - "RAG / knowledge base"
        - "Content structure / organisation"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a PR for this feature
