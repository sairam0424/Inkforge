name: CI

on:
  push:
    branches: [main, develop, "feature/**", "pr/**"]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm --filter @inkforge/core test

      - name: TypeScript — core
        run: pnpm --filter @inkforge/core typecheck

      - name: TypeScript — cli
        run: pnpm --filter @inkforge/cli typecheck

      - name: TypeScript — web
        run: cd apps/web && npx tsc --noEmit

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level high
        continue-on-error: true

      - name: Scan for hardcoded secrets
        run: |
          if grep -r "AKIA[A-Z0-9]\{16\}" packages apps --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "::error::AWS credentials found in source code"
            exit 1
          fi
          echo "✅ No hardcoded AWS credentials found"
